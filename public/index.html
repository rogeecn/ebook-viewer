<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ebook Library</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/list.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <h1>Ebook Library</h1>
      <div class="header-right">
        <div class="search-container">
          <input type="text" id="search-input" placeholder="Search ebooks..." autocomplete="off">
          <button id="search-clear" title="Clear search" style="display: none;">×</button>
        </div>
        <span id="ebook-count"></span>
        <button id="refresh-btn" title="Refresh file list">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
        </button>
      </div>
    </div>
    <div id="recent-section" style="display: none;">
      <div class="section-header">
        <h2>Recent Files</h2>
        <button id="clear-recents" title="Clear recent files">Clear</button>
      </div>
      <div id="recent-list"></div>
    </div>
    <div id="tree-container">
      <div id="tree-viewport">
        <div id="tree-content">
          <div id="top-spacer"></div>
          <div id="visible-rows"></div>
          <div id="bottom-spacer"></div>
        </div>
      </div>
      <div class="loading-overlay" id="loading-overlay">
        <div class="loading-text">Loading...</div>
      </div>
    </div>
  </div>
  <script type="module" src="/js/list.js"></script>
</body>
</html>
